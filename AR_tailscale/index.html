<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WyFyre AR Tailscale</title>
  <style>
    :root {
      --hud-bg: rgba(6, 15, 26, 0.72);
      --hud-border: rgba(137, 197, 255, 0.45);
      --hud-text: #c9e7ff;
      --accent: #58d1ff;
      --warn: #ffbf73;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
    body {
      background: radial-gradient(circle at 50% -20%, #11335c 0%, #060e1b 52%, #03070f 100%);
      color: var(--hud-text);
      font-family: "JetBrains Mono", "Consolas", monospace;
    }
    canvas#scene { width: 100vw; height: 100vh; display: block; }

    #hud {
      position: fixed;
      left: 16px;
      top: 16px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--hud-border);
      background: var(--hud-bg);
      backdrop-filter: blur(5px);
      font-size: 12px;
      line-height: 1.45;
      pointer-events: none;
      max-width: 320px;
    }
    #hud strong { color: #ffffff; }

    #xrOverlayRoot {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 18;
    }

    #radar {
      position: fixed;
      top: 16px;
      right: 16px;
      width: min(36vw, 300px);
      aspect-ratio: 1;
      border-radius: 12px;
      border: 1px solid var(--hud-border);
      background: rgba(2, 10, 18, 0.75);
      backdrop-filter: blur(5px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      pointer-events: none;
    }
    #radar canvas { width: 100%; height: 100%; display: block; }
    #radarTitle {
      position: absolute;
      left: 10px;
      top: 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: #d5edff;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(83, 182, 255, 0.4);
    }

    #actions {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }
    button {
      border: 1px solid rgba(120, 201, 255, 0.45);
      background: rgba(12, 32, 54, 0.75);
      color: #d4ecff;
      border-radius: 10px;
      padding: 10px 14px;
      font: 600 13px "JetBrains Mono", "Consolas", monospace;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
    }
    button:hover { transform: translateY(-1px); background: rgba(18, 45, 73, 0.85); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    @media (max-width: 720px) {
      #hud { font-size: 11px; max-width: 260px; }
      #actions { width: calc(100vw - 24px); justify-content: center; flex-wrap: wrap; }
      button { padding: 9px 12px; font-size: 12px; }
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="xrOverlayRoot">
    <div id="hud">
      <div><strong>WyFyre AR (Tailscale)</strong></div>
      <div id="status">Status: connecting...</div>
      <div id="transport">Transport: -</div>
      <div id="targets">Fused Targets: 0</div>
      <div id="nodes">Nodes: -</div>
      <div id="pitchNote" style="color: var(--warn)">Pitch ignored for sensor orientation.</div>
    </div>

    <div id="radar">
      <div id="radarTitle">Confidence Radar</div>
      <canvas id="radarCanvas" width="300" height="300"></canvas>
    </div>
  </div>

  <div id="actions">
    <button id="xrBtn">Enter XR</button>
  </div>

  <script>
    const WS_PROTO = location.protocol === "https:" ? "wss" : "ws";
    const WS_URL = `${WS_PROTO}://${location.host}/ws`;
    const MAX_RENDERED_TARGETS = 8;
    const MIN_VR_REGISTER_MM = 450;
    const SENSOR_HEIGHT_OFFSET_M = -0.15;
    const LERP = 0.15;
    const FORCE_WORLD_RADAR_IN_AR = /OculusBrowser|Quest/i.test(navigator.userAgent || "");

    const sceneCanvas = document.getElementById("scene");
    const engine = new BABYLON.Engine(sceneCanvas, true);
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.01, 0.03, 0.06, 1.0);

    let camera = new BABYLON.UniversalCamera("cam", new BABYLON.Vector3(0, 1.6, -0.8), scene);
    camera.setTarget(new BABYLON.Vector3(0, 1.6, 2));
    camera.attachControl(sceneCanvas, true);

    const light = new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0, 1, 0), scene);
    light.intensity = 0.65;

    const ground = BABYLON.MeshBuilder.CreateGround("g", { width: 12, height: 12, subdivisions: 10 }, scene);
    const gm = new BABYLON.StandardMaterial("gm", scene);
    gm.wireframe = true;
    gm.alpha = 0.15;
    gm.emissiveColor = new BABYLON.Color3(0.25, 0.8, 1.0);
    ground.material = gm;

    const glow = new BABYLON.GlowLayer("gl", scene);
    glow.intensity = 1.25;

    const targetSlots = [];
    const slotByTrackId = new Map();
    const latestTargetPoints = [];
    const latestRejectedPoints = [];
    let latestHeatmap = null;
    let latestExtent = null;
    let radarConfig = { maxRangeMm: 6000, azimuthHalfDeg: 60, minValidRangeMm: 450 };
    let xrSessionMode = null;
    let xrDomOverlayActive = false;

    function makeTargetSlot(i) {
      const root = new BABYLON.TransformNode(`target_${i}`, scene);

      const silhouetteMat = new BABYLON.StandardMaterial(`sm_${i}`, scene);
      silhouetteMat.emissiveColor = new BABYLON.Color3(0.25, 0.95, 1.0);
      silhouetteMat.alpha = 0.66;
      silhouetteMat.backFaceCulling = false;

      const body = BABYLON.MeshBuilder.CreateCapsule(`body_${i}`, {
        radius: 0.12,
        height: 0.8,
        subdivisions: 5,
      }, scene);
      body.parent = root;
      body.position.y = 0.4;
      body.material = silhouetteMat;

      const shoulders = BABYLON.MeshBuilder.CreateCylinder(`shoulders_${i}`, {
        height: 0.16,
        diameterTop: 0.34,
        diameterBottom: 0.42,
        tessellation: 14,
      }, scene);
      shoulders.parent = root;
      shoulders.position.y = 0.82;
      shoulders.material = silhouetteMat;

      const head = BABYLON.MeshBuilder.CreateSphere(`head_${i}`, { diameter: 0.25, segments: 10 }, scene);
      head.parent = root;
      head.position.y = 1.1;
      head.material = silhouetteMat;

      const aura = BABYLON.MeshBuilder.CreateDisc(`aura_${i}`, { radius: 0.19, tessellation: 40 }, scene);
      aura.parent = root;
      aura.rotation.x = Math.PI * 0.5;
      aura.position.y = 0.01;
      const auraMat = new BABYLON.StandardMaterial(`am_${i}`, scene);
      auraMat.emissiveColor = new BABYLON.Color3(0.35, 0.95, 1.0);
      auraMat.alpha = 0.95;
      auraMat.backFaceCulling = false;
      aura.material = auraMat;

      root.setEnabled(false);
      return {
        slotIndex: i,
        trackId: null,
        root,
        aura,
        auraMat,
        silhouetteMat,
        confidence: 0,
        targetPos: new BABYLON.Vector3(0, 0, 0),
        pulse: 1,
        lastSeenMs: 0,
      };
    }

    for (let i = 0; i < MAX_RENDERED_TARGETS; i += 1) {
      targetSlots.push(makeTargetSlot(i));
    }

    function getPoseSourceCamera() {
      const xrCam = scene.activeCamera;
      return xrCam || camera;
    }

    function getYawRadians(cam) {
      if (cam && cam.absoluteRotation) {
        return cam.absoluteRotation.toEulerAngles().y;
      }
      if (cam && cam.rotation) {
        return cam.rotation.y;
      }
      return 0;
    }

    function sensorPointToWorld(xMm, yMm) {
      const cam = getPoseSourceCamera();
      const yaw = getYawRadians(cam);
      const local = new BABYLON.Vector3(xMm / 1000, SENSOR_HEIGHT_OFFSET_M, yMm / 1000);
      const rot = BABYLON.Quaternion.FromEulerAngles(0, yaw, 0);
      const worldOffset = local.applyRotationQuaternion(rot);
      const world = cam.globalPosition.add(worldOffset);
      world.y = 0;
      return world;
    }

    function releaseStaleSlots(nowMs) {
      for (const slot of targetSlots) {
        if (slot.trackId !== null && (nowMs - slot.lastSeenMs) > 550) {
          slotByTrackId.delete(slot.trackId);
          slot.trackId = null;
          slot.root.setEnabled(false);
        }
      }
    }

    function getFreeSlot() {
      for (const slot of targetSlots) {
        if (slot.trackId === null) {
          return slot;
        }
      }
      return null;
    }

    function updateTargets(frame) {
      const nowMs = Date.now();
      const targets = frame.fused_targets || [];
      const minVrDistanceMm = Math.max(MIN_VR_REGISTER_MM, radarConfig.minValidRangeMm || MIN_VR_REGISTER_MM);
      const isVrSession = xrSessionMode === "immersive-vr";
      let registeredCount = 0;
      latestTargetPoints.length = 0;
      latestRejectedPoints.length = 0;

      for (const t of targets.slice(0, MAX_RENDERED_TARGETS)) {
        const rangeMm = Math.sqrt((t.x_mm * t.x_mm) + (t.y_mm * t.y_mm));
        if (isVrSession && rangeMm < minVrDistanceMm) {
          latestRejectedPoints.push({ x_mm: t.x_mm, y_mm: t.y_mm });
          continue;
        }

        let slot = slotByTrackId.get(t.track_id);
        if (!slot) {
          slot = getFreeSlot();
          if (!slot) {
            continue;
          }
          slot.trackId = t.track_id;
          slotByTrackId.set(t.track_id, slot);
          slot.pulse = 0;
          slot.root.setEnabled(true);
        }

        slot.confidence = Math.max(0, Math.min(1, t.confidence || 0));
        slot.targetPos.copyFrom(sensorPointToWorld(t.x_mm, t.y_mm));
        slot.lastSeenMs = nowMs;
        latestTargetPoints.push({ x_mm: t.x_mm, y_mm: t.y_mm, confidence: slot.confidence });
        registeredCount += 1;
      }

      for (const d of (frame.rejected_near || [])) {
        latestRejectedPoints.push({ x_mm: d.x_mm, y_mm: d.y_mm });
      }

      releaseStaleSlots(nowMs);
      document.getElementById("targets").textContent = `Fused Targets: ${registeredCount}`;
    }

    function updateHud(frame) {
      const nodeSummary = (frame.status?.nodes || [])
        .map((n) => n.online ? `${n.node_id}:on(${n.age_ms}ms)` : `${n.node_id}:off`)
        .join(" | ");
      document.getElementById("transport").textContent = `Transport: ${frame.receiver_mode}`;
      document.getElementById("nodes").textContent = `Nodes: ${nodeSummary || "-"}`;
    }

    function decodeHeatmapBlob(blobB64) {
      const binary = atob(blobB64);
      const out = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        out[i] = binary.charCodeAt(i);
      }
      return out;
    }

    function updateHeatmap(frame) {
      if (!frame.heatmap || !frame.heatmap.u8_b64) {
        return;
      }
      if (frame.radar) {
        radarConfig.maxRangeMm = frame.radar.max_range_mm || radarConfig.maxRangeMm;
        radarConfig.azimuthHalfDeg = frame.radar.azimuth_half_deg || radarConfig.azimuthHalfDeg;
        radarConfig.minValidRangeMm = frame.radar.min_valid_range_mm || radarConfig.minValidRangeMm;
      }
      latestHeatmap = {
        width: frame.heatmap.width,
        height: frame.heatmap.height,
        data: decodeHeatmapBlob(frame.heatmap.u8_b64),
      };
      latestExtent = frame.heatmap.extent;
    }

    const radarCanvas = document.getElementById("radarCanvas");
    const radarCtx = radarCanvas.getContext("2d");
    const xrRadarTexture = new BABYLON.DynamicTexture(
      "xrRadarTexture",
      { width: radarCanvas.width, height: radarCanvas.height },
      scene,
      false,
    );
    const xrRadarTextureCtx = xrRadarTexture.getContext();
    const xrRadarPlane = BABYLON.MeshBuilder.CreatePlane("xrRadarPlane", { width: 0.3, height: 0.3 }, scene);
    xrRadarPlane.isPickable = false;
    xrRadarPlane.setEnabled(false);
    const xrRadarMat = new BABYLON.StandardMaterial("xrRadarMat", scene);
    xrRadarMat.disableLighting = true;
    xrRadarMat.emissiveTexture = xrRadarTexture;
    xrRadarMat.diffuseTexture = xrRadarTexture;
    xrRadarMat.alpha = 0.98;
    xrRadarMat.backFaceCulling = false;
    xrRadarPlane.material = xrRadarMat;

    function radarToCanvas(xMm, yMm) {
      const w = radarCanvas.width;
      const h = radarCanvas.height;
      const cx = w * 0.5;
      const cy = h * 0.86;
      const maxR = h * 0.73;

      const angle = Math.atan2(xMm, Math.max(1, yMm));
      const distNorm = Math.min(1, Math.sqrt((xMm * xMm + yMm * yMm)) / radarConfig.maxRangeMm);
      const r = distNorm * maxR;
      return {
        x: cx + Math.sin(angle) * r,
        y: cy - Math.cos(angle) * r,
      };
    }

    function radarAngles() {
      const half = (radarConfig.azimuthHalfDeg * Math.PI) / 180;
      return {
        start: (-Math.PI * 0.5) - half,
        end: (-Math.PI * 0.5) + half,
      };
    }

    function pointInRadarFov(xMm, yMm) {
      const angleDeg = Math.abs(Math.atan2(xMm, Math.max(1, yMm)) * (180 / Math.PI));
      const rangeMm = Math.sqrt((xMm * xMm) + (yMm * yMm));
      return angleDeg <= radarConfig.azimuthHalfDeg && rangeMm <= radarConfig.maxRangeMm;
    }

    function infernoColor(v255) {
      const t = Math.max(0, Math.min(1, v255 / 255));
      const stops = [
        [0.00, [0, 0, 4]],
        [0.18, [31, 12, 72]],
        [0.36, [85, 15, 109]],
        [0.54, [136, 34, 106]],
        [0.72, [186, 54, 85]],
        [0.86, [227, 89, 51]],
        [0.94, [249, 140, 10]],
        [1.00, [252, 255, 164]],
      ];
      for (let i = 1; i < stops.length; i += 1) {
        const [t1, c1] = stops[i];
        const [t0, c0] = stops[i - 1];
        if (t <= t1) {
          const k = (t - t0) / Math.max(1e-6, (t1 - t0));
          return {
            r: Math.round(c0[0] + (c1[0] - c0[0]) * k),
            g: Math.round(c0[1] + (c1[1] - c0[1]) * k),
            b: Math.round(c0[2] + (c1[2] - c0[2]) * k),
          };
        }
      }
      return { r: 252, g: 255, b: 164 };
    }

    function drawRadarBase() {
      const w = radarCanvas.width;
      const h = radarCanvas.height;
      const cx = w * 0.5;
      const cy = h * 0.86;
      const maxR = h * 0.73;
      const ang = radarAngles();

      radarCtx.clearRect(0, 0, w, h);
      radarCtx.fillStyle = "rgba(3,12,23,0.72)";
      radarCtx.fillRect(0, 0, w, h);

      radarCtx.beginPath();
      radarCtx.moveTo(cx, cy);
      radarCtx.arc(cx, cy, maxR, ang.start, ang.end);
      radarCtx.closePath();
      radarCtx.fillStyle = "rgba(38,78,120,0.34)";
      radarCtx.fill();

      radarCtx.strokeStyle = "rgba(110,210,255,0.92)";
      radarCtx.lineWidth = 1.3;
      for (let i = 1; i <= 6; i += 1) {
        const r = (maxR * i) / 6;
        radarCtx.beginPath();
        radarCtx.arc(cx, cy, r, ang.start, ang.end);
        radarCtx.stroke();
        const meters = Math.round((radarConfig.maxRangeMm * i) / 6 / 100) / 10;
        radarCtx.fillStyle = "rgba(208, 236, 255, 0.96)";
        radarCtx.font = "10px JetBrains Mono, Consolas, monospace";
        radarCtx.fillText(`${meters}m`, cx + 6, cy - r - 3);
      }

      const spread = radarConfig.azimuthHalfDeg;
      [(-spread), (-spread / 2), 0, (spread / 2), spread].forEach((deg) => {
        const rad = (deg * Math.PI) / 180;
        const x = cx + Math.sin(rad) * maxR;
        const y = cy - Math.cos(rad) * maxR;
        radarCtx.beginPath();
        radarCtx.moveTo(cx, cy);
        radarCtx.lineTo(x, y);
        radarCtx.stroke();
        radarCtx.fillStyle = "rgba(208, 236, 255, 0.98)";
        radarCtx.font = "10px JetBrains Mono, Consolas, monospace";
        radarCtx.fillText(`${deg.toFixed(0)}deg`, x * 0.92 + cx * 0.08 - 14, y * 0.92 + cy * 0.08 - 2);
      });

      const cutoffR = Math.min(maxR, (radarConfig.minValidRangeMm / Math.max(1, radarConfig.maxRangeMm)) * maxR);
      radarCtx.beginPath();
      radarCtx.setLineDash([5, 4]);
      radarCtx.arc(cx, cy, cutoffR, ang.start, ang.end);
      radarCtx.strokeStyle = "rgba(168, 168, 168, 0.9)";
      radarCtx.lineWidth = 1.4;
      radarCtx.stroke();
      radarCtx.setLineDash([]);
      radarCtx.fillStyle = "rgba(186, 186, 186, 0.95)";
      radarCtx.font = "11px JetBrains Mono, Consolas, monospace";
      radarCtx.fillText(`cutoff ${Math.round(radarConfig.minValidRangeMm)}mm`, cx + 10, cy - cutoffR - 8);
    }

    function drawHeatmapOnRadar() {
      if (!latestHeatmap || !latestExtent) {
        return;
      }
      const hm = latestHeatmap;
      const ex = latestExtent;

      for (let row = 0; row < hm.height; row += 1) {
        for (let col = 0; col < hm.width; col += 1) {
          const i = row * hm.width + col;
          const v = hm.data[i];
          if (v < 8) {
            continue;
          }

          const xMm = ex.x_min_mm + (col / (hm.width - 1)) * (ex.x_max_mm - ex.x_min_mm);
          const yMm = ex.y_min_mm + (row / (hm.height - 1)) * (ex.y_max_mm - ex.y_min_mm);
          if (!pointInRadarFov(xMm, yMm)) {
            continue;
          }
          const p = radarToCanvas(xMm, yMm);

          const c = infernoColor(v);
          const alpha = Math.min(0.88, (v / 255) * 0.92);
          radarCtx.fillStyle = `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha})`;
          radarCtx.fillRect(p.x - 2.0, p.y - 2.0, 4.0, 4.0);
        }
      }
    }

    function drawTargetsOnRadar() {
      for (const t of latestTargetPoints) {
        const p = radarToCanvas(t.x_mm, t.y_mm);
        radarCtx.beginPath();
        radarCtx.fillStyle = `rgba(138, 244, 255, ${0.74 + 0.26 * t.confidence})`;
        radarCtx.arc(p.x, p.y, 2 + 4 * t.confidence, 0, Math.PI * 2);
        radarCtx.fill();
      }

      for (const d of latestRejectedPoints) {
        const p = radarToCanvas(d.x_mm, d.y_mm);
        radarCtx.beginPath();
        radarCtx.fillStyle = "rgba(166, 166, 166, 0.9)";
        radarCtx.arc(p.x, p.y, 2.2, 0, Math.PI * 2);
        radarCtx.fill();
      }
    }

    function renderRadar() {
      drawRadarBase();
      drawHeatmapOnRadar();
      drawTargetsOnRadar();
    }

    function updateArRadarOverlay() {
      const show = xrSessionMode === "immersive-ar" && (!xrDomOverlayActive || FORCE_WORLD_RADAR_IN_AR);
      xrRadarPlane.setEnabled(show);
      if (!show) {
        xrRadarPlane.parent = null;
        return;
      }

      const cam = scene.activeCamera;
      if (!cam) {
        return;
      }

      if (xrRadarPlane.parent) {
        xrRadarPlane.parent = null;
      }

      const camPos = cam.globalPosition || cam.position;
      const forward = cam.getDirection(BABYLON.Axis.Z);
      const right = cam.getDirection(BABYLON.Axis.X);
      const up = cam.getDirection(BABYLON.Axis.Y);

      const forwardDist = FORCE_WORLD_RADAR_IN_AR ? 0.75 : 0.8;
      const rightOffset = FORCE_WORLD_RADAR_IN_AR ? 0.24 : 0.28;
      const upOffset = FORCE_WORLD_RADAR_IN_AR ? 0.13 : 0.17;

      xrRadarPlane.position.copyFrom(camPos)
        .addInPlace(forward.scale(forwardDist))
        .addInPlace(right.scale(rightOffset))
        .addInPlace(up.scale(upOffset));
      xrRadarPlane.lookAt(camPos);
      xrRadarPlane.rotate(BABYLON.Axis.Y, Math.PI, BABYLON.Space.LOCAL);

      xrRadarTextureCtx.clearRect(0, 0, radarCanvas.width, radarCanvas.height);
      xrRadarTextureCtx.drawImage(radarCanvas, 0, 0, radarCanvas.width, radarCanvas.height);
      xrRadarTexture.update(false);
    }

    function connectWs() {
      const ws = new WebSocket(WS_URL);
      document.getElementById("status").textContent = "Status: connecting...";

      ws.onopen = () => {
        document.getElementById("status").textContent = "Status: connected";
        ws.send(JSON.stringify({ type: "hello", role: "quest" }));
      };

      ws.onmessage = ({ data }) => {
        const frame = JSON.parse(data);
        if (frame.type !== "fusion_frame") {
          return;
        }
        updateTargets(frame);
        updateHeatmap(frame);
        updateHud(frame);
      };

      ws.onclose = () => {
        document.getElementById("status").textContent = "Status: disconnected; retrying...";
        setTimeout(connectWs, 1500);
      };

      ws.onerror = () => {
        document.getElementById("status").textContent = "Status: socket error";
      };
    }

    function animateTargets() {
      const now = Date.now();
      for (const slot of targetSlots) {
        if (slot.trackId === null) {
          continue;
        }
        BABYLON.Vector3.LerpToRef(slot.root.position, slot.targetPos, LERP, slot.root.position);

        if (slot.pulse < 1) {
          slot.pulse = Math.min(1, slot.pulse + 0.06);
        }

        const auraScale = 1 + slot.pulse * 1.8;
        slot.aura.scaling.setAll(auraScale);
        slot.auraMat.alpha = 0.96 - slot.pulse * 0.76;

        const conf = slot.confidence;
        slot.silhouetteMat.alpha = 0.42 + conf * 0.4;
        slot.root.setEnabled((now - slot.lastSeenMs) <= 600);
      }
    }

    async function setupXr() {
      const xrBtn = document.getElementById("xrBtn");
      const xrOverlayRoot = document.getElementById("xrOverlayRoot");
      if (!navigator.xr) {
        xrBtn.textContent = "XR unavailable";
        xrBtn.disabled = true;
        return;
      }

      let mode = null;
      if (await navigator.xr.isSessionSupported("immersive-ar")) {
        mode = "immersive-ar";
        xrBtn.textContent = "Enter AR";
      } else if (await navigator.xr.isSessionSupported("immersive-vr")) {
        mode = "immersive-vr";
        xrBtn.textContent = "Enter VR";
      } else {
        xrBtn.textContent = "XR unsupported";
        xrBtn.disabled = true;
        return;
      }

      xrBtn.onclick = async () => {
        try {
          const xr = await scene.createDefaultXRExperienceAsync({
            uiOptions: { sessionMode: mode },
            disableDefaultUI: true,
            disableTeleportation: true,
            disablePointerSelection: true,
            disableNearInteraction: true,
          });
          let enteredWithOverlay = false;
          if (xrOverlayRoot) {
            try {
              await xr.baseExperience.enterXRAsync(mode, "local-floor", xr.renderTarget, {
                optionalFeatures: ["dom-overlay"],
                domOverlay: { root: xrOverlayRoot },
              });
              enteredWithOverlay = true;
            } catch (_domOverlayErr) {
            }
          }
          if (!enteredWithOverlay) {
            await xr.baseExperience.enterXRAsync(mode, "local-floor", xr.renderTarget);
          }
          xrSessionMode = mode;
          xrDomOverlayActive = Boolean(xr.baseExperience.sessionManager.session?.domOverlayState);
          if (mode === "immersive-ar") {
            scene.clearColor = new BABYLON.Color4(0, 0, 0, 0);
            ground.setEnabled(false);
          }
          document.getElementById("actions").style.display = "none";

          xr.baseExperience.sessionManager.onXRSessionEnded.add(() => {
            xrSessionMode = null;
            xrDomOverlayActive = false;
            ground.setEnabled(true);
            scene.clearColor = new BABYLON.Color4(0.01, 0.03, 0.06, 1.0);
            document.getElementById("actions").style.display = "flex";
          });
        } catch (err) {
          xrBtn.textContent = `XR error: ${err.message}`;
        }
      };
    }

    connectWs();
    setupXr();

    scene.onBeforeRenderObservable.add(() => {
      animateTargets();
      renderRadar();
      updateArRadarOverlay();
    });

    engine.runRenderLoop(() => scene.render());
    window.addEventListener("resize", () => engine.resize());
  </script>
</body>
</html>
